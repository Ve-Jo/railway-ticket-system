services:
  mysql:
    image: mysql:8.4
    container_name: diploma-mysql
    environment:
      MYSQL_ALLOW_EMPTY_PASSWORD: "yes"
      MYSQL_DATABASE: railway_ticket_system
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot --silent"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 15s
    volumes:
      - diploma_mysql_data:/var/lib/mysql

volumes:
  diploma_mysql_data:
